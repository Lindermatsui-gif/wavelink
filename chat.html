<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WaveLink Chat</title>
    <link rel="stylesheet" href="/static/chat.css">
</head>

<body>

<div id="container">

    <!-- SIDEBAR USERS -->
    <div id="sidebar"></div>

    <!-- CHAT -->
    <div id="chat">

        <!-- MESSAGES -->
        <div id="messages"></div>

        <!-- INPUT AREA -->
        <div id="inputArea">

            <input id="msgInput" type="text" placeholder="Write a message...">

            <input type="file" id="fileInput">

            <button onclick="sendMessage()">Send</button>

            <button onclick="handleFile()">📎 File</button>

        </div>

    </div>

</div>

<!-- JS -->
<script src="/static/chat.js"></script>

</body>
</html>
